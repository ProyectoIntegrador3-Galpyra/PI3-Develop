name: Backend CI - FastAPI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  sonarcloud:
    name: sonarcloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov httpx

      - name: Create dummy coverage if project is not ready
        run: |
          if [ ! -f requirements.txt ] && [ ! -f pyproject.toml ] && [ ! -f app/main.py ] && [ ! -f main.py ]; then
            echo "Backend not initialized yet. Creating dummy coverage."
            echo '<coverage version="1"></coverage>' > coverage.xml
          fi

      - name: Run tests with coverage if tests exist
        run: |
          if [ -d tests ]; then
            if [ -d app ]; then
              pytest -q --maxfail=1 --disable-warnings --cov=app --cov-report=xml || true
            else
              pytest -q --maxfail=1 --disable-warnings --cov=. --cov-report=xml || true
            fi
          else
            echo "No tests folder found."
            if [ ! -f coverage.xml ]; then
              echo '<coverage version="1"></coverage>' > coverage.xml
            fi
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
