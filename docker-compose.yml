version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: galpyra-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: galpyra_db
      MYSQL_USER: ${MYSQL_USER:-galpyra}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_user}
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: galpyra-api
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-galpyra}:${MYSQL_PASSWORD:-change_me_user}@mysql:3306/galpyra_db
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  mysql_data:
